<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TodoWeek">
  <meta name="theme-color" content="#ffffff">
  <title>TodoWeek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo" id="logo-btn">Todo<span>Week</span></div>
    <div id="global-input-row">
      <input id="global-input" type="text" placeholder="タスクを素早く追加…">
      <button id="global-add-btn">＋</button>
    </div>
    <div id="sync-status" title="タップして設定">
      <div id="sync-dot"></div>
      <span id="sync-label">未設定</span>
    </div>
  </header>

  <!-- ── TABLE ── -->
  <div id="table-wrap">
    <table id="main-table">
      <colgroup id="cols"></colgroup>
      <thead><tr id="date-row"></tr></thead>
      <tbody id="task-body"></tbody>
    </table>
  </div>

</div><!-- /#app -->


<!-- ── TASK MODAL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">新規作成</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input class="form-input" id="f-title" type="text" placeholder="例: 数学の宿題提出">
    </div>

    <div class="form-group">
      <label class="form-label">日付（期限）</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <div class="form-group">
      <label class="form-label">リマインド</label>
      <select class="form-select" id="f-remind">
        <option value="1">1日前</option>
        <option value="2" selected>2日前</option>
        <option value="3">3日前</option>
        <option value="5">5日前</option>
        <option value="7">7日前</option>
        <option value="10">10日前</option>
        <option value="14">2週間前</option>
        <option value="30">30日前</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">教科</label>
      <select class="form-select" id="f-subject">
        <option value="なし" selected>なし</option>
        <option value="国語">国語</option>
        <option value="数学">数学</option>
        <option value="英語">英語</option>
        <option value="化学">化学</option>
        <option value="生物">生物</option>
        <option value="日本史">日本史</option>
        <option value="情報">情報</option>
        <option value="カスタム">カスタム</option>
      </select>
    </div>

    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>


<!-- ── SETUP MODAL ── -->
<div id="setup-overlay">
  <div id="setup-box">
    <h2>👤 ユーザーID設定</h2>
    <p>自分だけのIDを決めてください。同じIDを使えばスマホ・iPad・PCどの端末からでもデータが共有されます。</p>
    <div class="setup-field">
      <label>ユーザーID</label>
      <input
        type="text"
        id="setup-uid"
        placeholder="例: taro2025"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
      >
    </div>
    <button id="setup-save">保存して同期開始</button>
    <p id="setup-hint">英数字・ハイフン・アンダーバーのみ使えます。<br>他の人と同じIDにすると共有されます。</p>
    <button id="setup-skip">スキップ（このデバイスのみで使う）</button>
  </div>
</div>


<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
