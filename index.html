<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TodoRemind">
  <meta name="theme-color" content="#ffffff">
  <title>TodoRemind</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo" id="logo-btn">Todo<span>Remind</span></div>
    <div id="sync-status" title="タップして設定">
      <div id="sync-dot"></div>
      <span id="sync-label">未設定</span>
    </div>
    <div id="settings-wrap">
      <button id="settings-btn" title="設定">⚙️</button>
      <div id="settings-menu">
        <button class="settings-item" id="settings-notif">🔔 通知設定</button>
        <hr class="settings-divider">
        <button class="settings-item" id="settings-fav">⭐ お気に入り設定</button>
        <hr class="settings-divider">
        <button class="settings-item" id="settings-cache">🔄 キャッシュをクリアして再読み込み</button>
      </div>
    </div>
  </header>

  <!-- ── MAIN TABLE ── -->
  <div id="table-outer">
    <!-- 長期目標行（スクロール外・固定） -->
    <div id="goal-row-wrap"></div>
    <!-- スクロール可能エリア（日付ヘッダー＋タスク列） -->
    <div id="scroll-wrap">
      <div id="scroll-inner">
        <div id="date-row-wrap"></div>
        <div id="columns-wrap"></div>
      </div>
    </div>
  </div>

  <!-- ── OVERDUE SECTION ── -->
  <div id="overdue-section" class="hidden">
    <div id="overdue-header">
      <span id="overdue-title">⚠️ 未達成の過去タスク</span>
      <button id="overdue-toggle">▼ 閉じる</button>
    </div>
    <div id="overdue-list"></div>
  </div>

</div><!-- /#app -->


<!-- ── TASK MODAL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">新規作成</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <div class="title-fav-row">
        <input class="form-input" id="f-title" type="text" placeholder="例: 数学の宿題提出">
        <select class="form-select fav-select" id="f-fav-apply" title="お気に入りから入力">
          <option value="">⭐ お気に入り</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="event-checkbox-label">
        <input type="checkbox" id="f-is-event">
        <span>予定にする（チェックボックスなし）</span>
      </label>
    </div>

    <div class="form-group" id="f-date-group" style="display:none;">
      <label class="form-label">日付（期限）</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <div class="form-group" style="display:none;">
      <label class="form-label">リマインド</label>
      <select class="form-select" id="f-remind">
        <option value="0">なし</option>
        <option value="today">当日</option>
        <option value="1">1日前</option>
        <option value="2" selected>2日前</option>
        <option value="3">3日前</option>
        <option value="5">5日前</option>
        <option value="7">7日前</option>
        <option value="10">10日前</option>
        <option value="14">2週間前</option>
        <option value="30">30日前</option>
      </select>
    </div>

    <div class="form-group" id="f-notif-time-group"></div>

    <div class="form-group">
      <label class="form-label">教科</label>
      <select class="form-select" id="f-subject" onchange="handleSubjectChange(this.value)">
        <option value="なし" selected>なし</option>
        <option value="国語">国語</option>
        <option value="数学">数学</option>
        <option value="英語">英語</option>
        <option value="化学">化学</option>
        <option value="物理">物理</option>
        <option value="生物">生物</option>
        <option value="地理">地理</option>
        <option value="日本史">日本史</option>
        <option value="世界史">世界史</option>
        <option value="情報">情報</option>
        <option value="カスタム">カスタム（自由入力）</option>
      </select>
    </div>

    <div class="form-group" id="custom-subject-group" style="display:none;">
      <label class="form-label">カスタム教科名</label>
      <input class="form-input" id="f-custom-subject" type="text" placeholder="例: 物理、体育、音楽…">
    </div>

    <!-- 書式 -->
    <div class="form-group">
      <label class="form-label">書式</label>
      <div class="format-section">
        <div class="format-row">
          <button type="button" class="fmt-btn" id="fmt-bold"
                  onclick="toggleFmt('bold')" title="太字">
            <strong>B</strong>
          </button>
          <button type="button" class="fmt-btn" id="fmt-underline"
                  onclick="toggleFmt('underline')" title="下線">
            <span style="text-decoration:underline;">U</span>
          </button>
          <button type="button" class="fmt-btn" id="fmt-double-underline"
                  onclick="toggleFmt('double-underline')" title="二重下線">
            <span style="text-decoration:underline double;">U</span>
          </button>
        </div>
        <div class="format-label-small">文字色</div>
        <div class="color-picker-row" id="color-fg-row"></div>
        <div class="color-custom-row">
          <label class="format-label-small" for="color-fg-custom">カスタム文字色</label>
          <input type="color" id="color-fg-custom" class="color-custom-input" value="#1a1e2e">
        </div>
        <div class="format-label-small">背景色</div>
        <div class="color-picker-row" id="color-bg-row"></div>
        <div class="color-custom-row">
          <label class="format-label-small" for="color-bg-custom">カスタム背景色</label>
          <input type="color" id="color-bg-custom" class="color-custom-input" value="#ffffff">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">プレビュー</label>
      <div id="format-preview" class="format-preview">テキスト</div>
    </div>

    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>


<!-- ── SETUP MODAL ── -->
<div id="setup-overlay">
  <div id="setup-box">
    <h2>👤 ユーザーID設定</h2>
    <p>自分だけのIDを決めてください。同じIDを使えばスマホ・iPad・PCどの端末からでもデータが共有されます。</p>

    <div id="setup-current-user-wrap">
      <span class="label">ログイン中：</span>
      <span id="setup-current-uid"></span>
    </div>

    <div class="setup-field">
      <label>ユーザーID（変更する場合）</label>
      <input type="text" id="setup-uid" placeholder="例: GIGAJI"
        autocomplete="off" autocapitalize="off" spellcheck="false" tabindex="1">
    </div>

    <button id="setup-save" tabindex="2">保存して同期開始</button>
    <p id="setup-hint">英数字・ハイフン・アンダーバーのみ使えます。<br>他の人と同じIDにすると共有されます。</p>

    <button id="setup-logout" tabindex="3">ログアウト（このデバイスのデータを削除）</button>
    <button id="setup-skip" tabindex="4">スキップ（このデバイスのみで使う）</button>
  </div>
</div>


<!-- ── 通知モーダル ── -->
<div id="notif-overlay">
  <div id="notif-box">
    <div class="notif-modal-title">
      <span>🔔 通知設定</span>
      <button id="notif-close-btn" class="modal-close">✕</button>
    </div>

    <!-- この端末の通知状態 -->
    <div class="notif-status-card" id="notif-status-card">
      <div class="notif-status-info">
        <div class="notif-status-label">この端末の通知</div>
        <div class="notif-status-text" id="notif-status-text">確認中…</div>
      </div>
      <button class="btn-notif" id="notif-toggle-btn" onclick="handleNotifBtn()">確認中</button>
    </div>

    <!-- デバッグメッセージ -->
    <div id="notif-debug-msg"></div>

    <!-- テスト通知 -->
    <div class="notif-section-divider"></div>
    <button class="btn-test-notif" id="notif-test-btn" onclick="sendTestNotif()">
      📨 テスト通知を送る
    </button>
    <div class="notif-test-hint">すべての登録端末に送信されます</div>
  </div>
</div>


<!-- ── お気に入りモーダル ── -->
<div class="modal-overlay" id="fav-modal-overlay">
  <div class="modal">
    <div class="modal-title">
      <span id="fav-modal-title-text">⭐ お気に入り設定</span>
      <button class="modal-close" id="fav-modal-close">✕</button>
    </div>

    <!-- 登録済みリスト -->
    <div id="fav-list-section">
      <div id="fav-list"></div>
      <button class="btn-primary" id="fav-new-btn" style="margin-top:10px;">＋ 新しいお気に入りを追加</button>
    </div>

    <!-- 編集フォーム -->
    <div id="fav-edit-section" style="display:none;">
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input class="form-input" id="fav-f-title" type="text" placeholder="例: 数学の宿題">
      </div>
      <div class="form-group">
        <label class="form-label">リマインド</label>
        <select class="form-select" id="fav-f-remind">
          <option value="0">なし</option>
          <option value="today">当日</option>
          <option value="1">1日前</option>
          <option value="2" selected>2日前</option>
          <option value="3">3日前</option>
          <option value="5">5日前</option>
          <option value="7">7日前</option>
          <option value="10">10日前</option>
          <option value="14">2週間前</option>
          <option value="30">30日前</option>
        </select>
      </div>
      <div class="form-group">
        <label class="event-checkbox-label">
          <input type="checkbox" id="fav-f-is-event">
          <span>予定にする（チェックボックスなし）</span>
        </label>
      </div>

      <div class="form-group" id="fav-f-notif-time-group"></div>
      <div class="form-group">
        <label class="form-label">教科</label>
        <select class="form-select" id="fav-f-subject" onchange="handleFavSubjectChange(this.value)">
          <option value="なし" selected>なし</option>
          <option value="国語">国語</option>
          <option value="数学">数学</option>
          <option value="英語">英語</option>
          <option value="化学">化学</option>
          <option value="物理">物理</option>
          <option value="生物">生物</option>
          <option value="地理">地理</option>
          <option value="日本史">日本史</option>
          <option value="世界史">世界史</option>
          <option value="情報">情報</option>
          <option value="カスタム">カスタム（自由入力）</option>
        </select>
      </div>
      <div class="form-group" id="fav-custom-subject-group" style="display:none;">
        <label class="form-label">カスタム教科名</label>
        <input class="form-input" id="fav-f-custom-subject" type="text" placeholder="例: 体育、音楽…">
      </div>
      <div class="form-group">
        <label class="form-label">書式</label>
        <div class="format-section">
          <div class="format-row">
            <button type="button" class="fmt-btn" id="fav-fmt-bold" onclick="toggleFavFmt('bold')" title="太字"><strong>B</strong></button>
            <button type="button" class="fmt-btn" id="fav-fmt-underline" onclick="toggleFavFmt('underline')" title="下線"><span style="text-decoration:underline;">U</span></button>
            <button type="button" class="fmt-btn" id="fav-fmt-double-underline" onclick="toggleFavFmt('double-underline')" title="二重下線"><span style="text-decoration:underline double;">U</span></button>
          </div>
          <div class="format-label-small">文字色</div>
          <div class="color-picker-row" id="fav-color-fg-row"></div>
          <div class="color-custom-row">
            <label class="format-label-small" for="fav-color-fg-custom">カスタム文字色</label>
            <input type="color" id="fav-color-fg-custom" class="color-custom-input" value="#1a1e2e">
          </div>
          <div class="format-label-small">背景色</div>
          <div class="color-picker-row" id="fav-color-bg-row"></div>
          <div class="color-custom-row">
            <label class="format-label-small" for="fav-color-bg-custom">カスタム背景色</label>
            <input type="color" id="fav-color-bg-custom" class="color-custom-input" value="#ffffff">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">プレビュー</label>
        <div id="fav-format-preview" class="format-preview">テキスト</div>
      </div>
      <div class="modal-actions" id="fav-modal-actions"></div>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
